<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Проекты — Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container">
        <a class="navbar-brand" href="/projects">Task Manager</a>
        <div class="d-flex gap-2">
            <a class="btn btn-outline-light btn-sm" href="/swagger-ui.html" target="_blank">Swagger</a>
            <button class="btn btn-light btn-sm" onclick="logout()">Выйти</button>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">Мои проекты</h1>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createProjectModal">Новый проект</button>
    </div>
    <div id="alert"></div>
    <div id="projectsList" class="row g-3"></div>
</div>

<div class="modal fade" id="createProjectModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="createProjectForm">
                <div class="modal-header">
                    <h5 class="modal-title">Создать проект</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label" for="projectName">Название</label>
                        <input type="text" class="form-control" id="projectName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="projectDescription">Описание</label>
                        <textarea class="form-control" id="projectDescription" rows="3"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Создать</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    if (requireAuth()) {
        loadProjects();
    }

    async function loadProjects() {
        try {
            const projects = await apiFetch('/api/projects');
            const container = document.getElementById('projectsList');
            if (projects.length === 0) {
                container.innerHTML = '<div class="col-12"><div class="alert alert-info">Проектов пока нет. Создайте первый.</div></div>';
                return;
            }
            container.innerHTML = projects.map(p => `
                <div class="col-md-6 col-lg-4">
                    <div class="card h-100 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">${escapeHtml(p.name)}</h5>
                            <p class="card-text text-muted">${escapeHtml(p.description || 'Без описания')}</p>
                            <span class="badge text-bg-secondary">${p.currentUserRole}</span>
                        </div>
                        <div class="card-footer bg-white">
                            <a href="/projects/${p.id}" class="btn btn-sm btn-outline-primary">Открыть</a>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            showAlert('alert', err.message);
        }
    }

    document.getElementById('createProjectForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            await apiFetch('/api/projects', {
                method: 'POST',
                body: JSON.stringify({
                    name: document.getElementById('projectName').value,
                    description: document.getElementById('projectDescription').value
                })
            });
            bootstrap.Modal.getInstance(document.getElementById('createProjectModal')).hide();
            document.getElementById('createProjectForm').reset();
            loadProjects();
        } catch (err) {
            showAlert('alert', err.message);
        }
    });
</script>
</body>
</html>
