<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Доска — Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/projects">Task Manager</a>
        <button class="btn btn-light btn-sm" onclick="logout()">Выйти</button>
    </div>
</nav>

<div class="container-fluid px-4">
    <div id="alert"></div>
    <div id="boardHeader" class="mb-3"></div>

    <div class="row g-2 mb-3 align-items-end">
        <div class="col-md-2">
            <label class="form-label small mb-1" for="filterQ">Поиск</label>
            <input type="text" class="form-control form-control-sm" id="filterQ" placeholder="По названию">
        </div>
        <div class="col-md-2">
            <label class="form-label small mb-1" for="filterPriority">Приоритет</label>
            <select class="form-select form-select-sm" id="filterPriority">
                <option value="">Все приоритеты</option>
                <option value="LOW">LOW</option>
                <option value="MEDIUM">MEDIUM</option>
                <option value="HIGH">HIGH</option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label small mb-1" for="filterStatus">Статус</label>
            <select class="form-select form-select-sm" id="filterStatus">
                <option value="">Все статусы</option>
                <option value="BACKLOG">BACKLOG</option>
                <option value="IN_PROGRESS">IN_PROGRESS</option>
                <option value="DONE">DONE</option>
                <option value="ARCHIVED">ARCHIVED</option>
            </select>
        </div>
        <div class="col-md-2">
            <label class="form-label small mb-1" for="filterAssignee">Исполнитель</label>
            <input type="number" class="form-control form-control-sm" id="filterAssignee" placeholder="ID">
        </div>
        <div class="col-md-2">
            <label class="form-label small mb-1" for="pageSize">Размер страницы</label>
            <select class="form-select form-select-sm" id="pageSize">
                <option value="5">5</option>
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
            </select>
        </div>
        <div class="col-md-2 text-end">
            <button class="btn btn-sm btn-outline-secondary mb-1" onclick="loadBoard()">Применить</button>
            <button class="btn btn-sm btn-outline-primary" id="createColumnBtn" data-bs-toggle="modal" data-bs-target="#createColumnModal">Новая колонка</button>
        </div>
    </div>

    <div id="kanban" class="kanban-board"></div>
</div>

<div class="modal fade" id="createColumnModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="createColumnForm">
                <div class="modal-header">
                    <h5 class="modal-title">Создать колонку</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label" for="columnName">Название</label>
                    <input type="text" class="form-control" id="columnName" required>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary">Создать</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="taskModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="taskForm">
                <div class="modal-header">
                    <h5 class="modal-title" id="taskModalTitle">Задача</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="taskId">
                    <input type="hidden" id="taskColumnId">
                    <div class="mb-3">
                        <label class="form-label" for="taskTitle">Название</label>
                        <input type="text" class="form-control" id="taskTitle" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="taskDescription">Описание</label>
                        <textarea class="form-control" id="taskDescription" rows="3"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="taskPriority">Приоритет</label>
                        <select class="form-select" id="taskPriority">
                            <option value="LOW">LOW</option>
                            <option value="MEDIUM" selected>MEDIUM</option>
                            <option value="HIGH">HIGH</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="taskDeadline">Дедлайн</label>
                        <input type="date" class="form-control" id="taskDeadline">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="taskAssignee">ID исполнителя</label>
                        <input type="number" class="form-control" id="taskAssignee">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="taskStatus">Статус</label>
                        <select class="form-select" id="taskStatus">
                            <option value="BACKLOG">BACKLOG</option>
                            <option value="IN_PROGRESS">IN_PROGRESS</option>
                            <option value="DONE">DONE</option>
                            <option value="ARCHIVED">ARCHIVED</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <small class="text-muted">История изменений доступна по кнопке ниже.</small>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-info me-auto d-none" id="historyTaskBtn">История</button>
                    <button type="button" class="btn btn-outline-danger me-auto d-none" id="deleteTaskBtn">Удалить</button>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div class="modal fade" id="historyModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">История задачи</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="historyContent" class="vstack gap-2"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script>
<script>
    const boardId = window.location.pathname.split('/').pop();
    let columns = [];
    let canWrite = true;
    let projectId = null;

    if (requireAuth()) {
        initBoard();
    }

    async function initBoard() {
        try {
            const boardInfo = await apiFetch(`/api/boards/${boardId}`);
            projectId = boardInfo.projectId;
            const project = await apiFetch(`/api/projects/${projectId}`);
            canWrite = project.currentUserRole === 'OWNER' || project.currentUserRole === 'EDITOR';
            document.getElementById('createColumnBtn').classList.toggle('d-none', !canWrite);

            document.getElementById('boardHeader').innerHTML = `
                <a href="/projects/${projectId}" class="text-decoration-none">&larr; К проекту</a>
                <h1 class="h3 mt-2">${escapeHtml(boardInfo.name)}</h1>
            `;
            await loadBoard();
        } catch (err) {
            showAlert('alert', err.message);
        }
    }

    async function loadBoard() {
        columns = await apiFetch(`/api/boards/${boardId}/columns`);
        const kanban = document.getElementById('kanban');
        const q = document.getElementById('filterQ').value;
        const priority = document.getElementById('filterPriority').value;
        const status = document.getElementById('filterStatus').value;
        const assignee = document.getElementById('filterAssignee').value;
        const size = document.getElementById('pageSize').value;

        const columnHtml = [];
        for (const column of columns) {
            const params = new URLSearchParams();
            if (q) params.set('q', q);
            if (priority) params.set('priority', priority);
            if (status) params.set('status', status);
            if (assignee) params.set('assigneeId', assignee);
            params.set('size', size);
            const query = params.toString() ? '?' + params.toString() : '';
            const pageResponse = await apiFetch(`/api/columns/${column.id}/tasks${query}`);
            const tasks = pageResponse.content || [];

            columnHtml.push(`
                <div class="kanban-column p-3">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h2 class="h6 mb-0">${escapeHtml(column.name)}</h2>
                        ${canWrite ? `<button class="btn btn-sm btn-outline-primary" onclick="openCreateTask(${column.id})">+</button>` : ''}
                    </div>
                    <div class="d-flex flex-column gap-2">
                        ${tasks.map(task => renderTaskCard(task, column.id)).join('')}
                    </div>
                    ${pageResponse.totalElements > tasks.length ? `<div class="small text-muted mt-2">Показано ${tasks.length} из ${pageResponse.totalElements}</div>` : ''}
                </div>
            `);
        }
        kanban.innerHTML = columnHtml.join('');
    }

    function renderTaskCard(task, columnId) {
        const moveOptions = columns.map(c =>
            `<option value="${c.id}" ${c.id === columnId ? 'selected' : ''}>${escapeHtml(c.name)}</option>`
        ).join('');

        return `
            <div class="card task-card priority-${task.priority} mb-0">
                <div class="card-body p-3">
                    <div class="fw-semibold">${escapeHtml(task.title)}</div>
                    <div class="small text-muted">${escapeHtml(task.description || '')}</div>
                    <div class="small mt-2">
                        <span class="badge text-bg-light">${task.priority}</span>
                        <span class="badge text-bg-secondary ms-1">${task.status || 'BACKLOG'}</span>
                        ${task.assigneeName ? `<span class="ms-1">${escapeHtml(task.assigneeName)}</span>` : ''}
                    </div>
                    ${canWrite ? `
                        <div class="mt-2 d-flex gap-1">
                            <button class="btn btn-sm btn-outline-secondary" onclick="openEditTask(${task.id})">Изменить</button>
                            <button class="btn btn-sm btn-outline-info" onclick="openHistory(${task.id})">История</button>
                            <select class="form-select form-select-sm" id="move-${task.id}" style="max-width: 120px;">${moveOptions}</select>
                            <button class="btn btn-sm btn-outline-primary" onclick="moveTask(${task.id})">→</button>
                        </div>
                    ` : ''}
                </div>
            </div>
        `;
    }

    async function moveTask(taskId) {
        const select = document.getElementById(`move-${taskId}`);
        try {
            await apiFetch(`/api/tasks/${taskId}/move`, {
                method: 'PATCH',
                body: JSON.stringify({ columnId: Number(select.value) })
            });
            loadBoard();
        } catch (err) {
            showAlert('alert', err.message);
        }
    }

    function openCreateTask(columnId) {
        document.getElementById('taskForm').reset();
        document.getElementById('taskId').value = '';
        document.getElementById('taskColumnId').value = columnId;
        document.getElementById('taskStatus').value = 'BACKLOG';
        document.getElementById('taskModalTitle').textContent = 'Новая задача';
        document.getElementById('historyTaskBtn').classList.add('d-none');
        document.getElementById('deleteTaskBtn').classList.add('d-none');
        new bootstrap.Modal(document.getElementById('taskModal')).show();
    }

    async function openEditTask(taskId) {
        const task = await apiFetch(`/api/tasks/${taskId}`);
        document.getElementById('taskId').value = task.id;
        document.getElementById('taskColumnId').value = task.columnId;
        document.getElementById('taskTitle').value = task.title;
        document.getElementById('taskDescription').value = task.description || '';
        document.getElementById('taskPriority').value = task.priority;
        document.getElementById('taskStatus').value = task.status || 'BACKLOG';
        document.getElementById('taskDeadline').value = task.deadline || '';
        document.getElementById('taskAssignee').value = task.assigneeId || '';
        document.getElementById('taskModalTitle').textContent = 'Редактировать задачу';
        document.getElementById('historyTaskBtn').classList.remove('d-none');
        document.getElementById('deleteTaskBtn').classList.remove('d-none');
        new bootstrap.Modal(document.getElementById('taskModal')).show();
    }

    document.getElementById('createColumnForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        try {
            await apiFetch(`/api/boards/${boardId}/columns`, {
                method: 'POST',
                body: JSON.stringify({ name: document.getElementById('columnName').value })
            });
            bootstrap.Modal.getInstance(document.getElementById('createColumnModal')).hide();
            document.getElementById('createColumnForm').reset();
            loadBoard();
        } catch (err) {
            showAlert('alert', err.message);
        }
    });

    document.getElementById('taskForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            title: document.getElementById('taskTitle').value,
            description: document.getElementById('taskDescription').value,
            priority: document.getElementById('taskPriority').value,
            status: document.getElementById('taskStatus').value,
            deadline: document.getElementById('taskDeadline').value || null,
            assigneeId: document.getElementById('taskAssignee').value ? Number(document.getElementById('taskAssignee').value) : null
        };
        const taskId = document.getElementById('taskId').value;
        const columnId = document.getElementById('taskColumnId').value;
        try {
            if (taskId) {
                await apiFetch(`/api/tasks/${taskId}`, { method: 'PUT', body: JSON.stringify(payload) });
            } else {
                await apiFetch(`/api/columns/${columnId}/tasks`, { method: 'POST', body: JSON.stringify(payload) });
            }
            bootstrap.Modal.getInstance(document.getElementById('taskModal')).hide();
            loadBoard();
        } catch (err) {
            showAlert('alert', err.message);
        }
    });

    async function openHistory(taskId) {
        try {
            const history = await apiFetch(`/api/tasks/${taskId}/history`);
            const content = document.getElementById('historyContent');
            content.innerHTML = history.length ? history.map(entry => `
                <div class="border rounded p-2">
                    <div class="d-flex justify-content-between align-items-center">
                        <strong>${escapeHtml(entry.action)}</strong>
                        <small class="text-muted">${new Date(entry.createdAt).toLocaleString()}</small>
                    </div>
                    <div class="small text-muted">${escapeHtml(entry.details || '')}</div>
                    ${entry.changedByName ? `<div class="small text-muted">Изменил: ${escapeHtml(entry.changedByName)}</div>` : ''}
                </div>
            `).join('') : '<div class="text-muted">История отсутствует</div>';
            new bootstrap.Modal(document.getElementById('historyModal')).show();
        } catch (err) {
            showAlert('alert', err.message);
        }
    }

    document.getElementById('historyTaskBtn').addEventListener('click', () => {
        const taskId = document.getElementById('taskId').value;
        if (taskId) {
            openHistory(taskId);
        }
    });

    document.getElementById('deleteTaskBtn').addEventListener('click', async () => {
        const taskId = document.getElementById('taskId').value;
        if (!taskId || !confirm('Удалить задачу?')) return;
        try {
            await apiFetch(`/api/tasks/${taskId}`, { method: 'DELETE' });
            bootstrap.Modal.getInstance(document.getElementById('taskModal')).hide();
            loadBoard();
        } catch (err) {
            showAlert('alert', err.message);
        }
    });
</script>
</body>
</html>
