databaseChangeLog:
  - changeSet:
      id: 006-notifications-sprints-activity
      author: taskmanager
      changes:
        - createTable:
            tableName: sprints
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: project_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_sprints_project
                    references: projects(id)
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: start_date
                  type: DATE
              - column:
                  name: end_date
                  type: DATE
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addColumn:
            tableName: tasks
            columns:
              - column:
                  name: sprint_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_tasks_sprint
                    references: sprints(id)
        - createTable:
            tableName: notifications
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_notifications_user
                    references: users(id)
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: message
                  type: VARCHAR(1000)
                  constraints:
                    nullable: false
              - column:
                  name: read_flag
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: project_id
                  type: BIGINT
              - column:
                  name: task_id
                  type: BIGINT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - createTable:
            tableName: project_activity
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: project_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_activity_project
                    references: projects(id)
              - column:
                  name: actor_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_activity_actor
                    references: users(id)
              - column:
                  name: action
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: details
                  type: VARCHAR(1000)
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
